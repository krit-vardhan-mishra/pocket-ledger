name: Android CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: Grant execute permission for Gradle wrapper
        run: chmod +x gradlew

      - name: Run unit tests
        run: ./gradlew test

      - name: Generate JaCoCo coverage report
        run: ./gradlew :app:jacocoTestReport

      - name: Assemble debug APK
        run: ./gradlew :app:assembleDebug

      - name: Upload debug APK artifact
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v4
        with:
          name: debug-apk
          path: app/build/outputs/apk/debug/app-debug.apk

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: unit-test-reports
          path: app/build/reports/tests/

      - name: Upload coverage reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: unit-test-coverage
          path: app/build/reports/jacoco/jacocoTestReport/

  publish-main-apk:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: build-and-test
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download debug APK artifact
        uses: actions/download-artifact@v4
        with:
          name: debug-apk
          path: release-assets

      - name: Publish rolling main release APK
        uses: softprops/action-gh-release@v2
        with:
          tag_name: main-latest
          name: Main Latest APK
          body: |
            Automated APK from latest commit on main.
            Commit: ${{ github.sha }}
            Run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          prerelease: true
          make_latest: false
          files: release-assets/app-debug.apk
          overwrite_files: true
          fail_on_unmatched_files: true
